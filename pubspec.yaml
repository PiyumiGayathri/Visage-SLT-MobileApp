name: visage_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  camera: ^0.10.5+5
  http: ^1.1.0
  permission_handler: ^11.0.1
  geolocator: ^10.1.0
  google_mlkit_face_detection: ^0.11.0
  safe_device: ^1.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

# Flutter Launcher Icons configuration (at root level, not under flutter:)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"